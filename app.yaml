# Databricks App configuration — ww-merch-ops
# Deploy: databricks apps deploy ww-merch-ops --source-code-path <workspace path>
# Attach a SQL warehouse resource named `warehouse` in the app settings; its
# HTTP path is exposed to the container as DATABRICKS_WAREHOUSE_HTTP_PATH below.
command: ["uvicorn", "backend.app:app", "--host", "0.0.0.0", "--port", "8000"]
env:
  - name: DATABRICKS_WAREHOUSE_HTTP_PATH
    valueFrom: warehouse
